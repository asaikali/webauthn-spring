<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PAR Client</title>
    <script src="/js/jquery-3.3.1.min.js"></script>
</head>
<body>
    <p>This sample starts the OAuth2 authorization code flow using Pushed Authorization Requests (PAR).</p>
    <p>The browser only sees a small authorization URL with a <code>request_uri</code>. The full request is pushed to the authorization server first.</p>
    <h1 id="message">Loading quote...</h1>
</body>
<script>
    function getMessage()
    {
        $.ajax({
            url : '/random-quote',
            type: 'GET',
            success: function(data){
                $('#message').text(data.quote + " -- " + data.author);
            },
            error: function (data) {
                $('#message').text("Error: Got No Response");
            }
        });
    }

    $(document).ready(function() {
        getMessage();
        window.setInterval(getMessage, 1000);
    });
</script>
</html>

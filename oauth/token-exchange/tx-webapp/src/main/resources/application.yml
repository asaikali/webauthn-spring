management:
  info:
    java:
      enabled: true
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"

server:
  port: 8180

logging:
  level:
    org.springframework.security: info

spring:
  security:
    oauth2:
      client:
        registration:
          demoAuthServer:
            provider: spring
            client-id: "quotes"
            client-secret: "abc123"
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: "openid,quotes.read"
        provider:
          spring:
            authorization-uri: http://localhost:9090/oauth2/authorize
            token-uri: http://localhost:9090/oauth2/token
            user-info-uri: http://localhost:9090/userinfo
            user-name-attribute: sub
            jwk-set-uri: http://localhost:9090/oauth2/jwks

tx:
  uppercase-base-url: http://localhost:8182
